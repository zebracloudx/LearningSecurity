<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronShield | Admin Login</title>
    <style>
        :root {
            --accent-cyan: #38bdf8;
            --accent-pink: #f43f5e;
            --accent-green: #4ade80;
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background: linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.9)), 
                        url('Gemini_Generated_Image_i7d7n6i7d7n6i7d7.png');
            background-size: cover;
            background-position: center;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background-color: rgba(17, 24, 39, 0.9);
            border: 1px solid var(--accent-pink);
            border-radius: 10px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 25px rgba(244, 63, 94, 0.3);
        }
        h2 {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-pink);
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(11, 15, 25, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 6px;
            color: var(--text-main);
            box-sizing: border-box;
        }
        .btn-submit {
            width: 100%;
            background-color: var(--accent-pink);
            color: #0b0f19;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.85rem;
        }
        #error-msg {
            color: var(--accent-pink);
            font-size: 0.85rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>🔒 Admin Portal</h2>
        <form id="login-form" onsubmit="handleMongoLogin(event)">
            <div class="input-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" required placeholder="">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="">
            </div>
            <button type="submit" class="btn-submit">Authenticate to MongoDB</button>
            <div id="error-msg"></div>
        </form>
        <a href="index.html" class="back-link">&larr; Back to Main Terminal</a>
    </div>

    <script>
    async function handleMongoLogin(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const errorDiv = document.getElementById('error-msg');
        
        errorDiv.style.color = "var(--accent-cyan)";
        errorDiv.textContent = "Connecting to MongoDB backend...";

        try {
            const response = await fetch('https://ir0nshield-main.onrender.com/api/test-sync', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user: email, 
                    password: password, 
                    action: 'ADMIN_LOGIN_TIMESTAMP',
                    timestamp: new Date().toISOString() 
                })
            });

            // Read raw text first to prevent JSON parse crashes
            const rawText = await response.text();
            let result;
            try {
                result = JSON.parse(rawText);
            } catch (e) {
                result = { message: rawText || "Server responded with non-JSON format" };
            }

            if (response.ok) {
                errorDiv.style.color = "var(--accent-green)";
                errorDiv.textContent = "Synced to MongoDB successfully! Redirecting...";
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 800);
            } else {
                errorDiv.style.color = "var(--accent-pink)";
                errorDiv.textContent = result.message || "MongoDB sync failed.";
            }
        } catch (err) {
            errorDiv.style.color = "var(--accent-pink)";
            errorDiv.textContent = "Network error: " + err.message;
        }
    }
</script>
