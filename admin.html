<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronShield | Admin Portal</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --accent-green: #10b981;
            --text-main: #f3f4f6;
            --border-color: rgba(75, 85, 99, 0.4);
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .hacking-card {
            background: rgba(17, 24, 39, 0.9);
            border: 1px solid var(--border-color);
            padding: 3rem 4rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            backdrop-filter: blur(5px);
        }

        h1 {
            color: var(--accent-green);
            margin: 0 0 1rem 0;
            font-size: 2rem;
        }

        p {
            font-size: 1.2rem;
            color: var(--text-main);
            letter-spacing: 1px;
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="hacking-card">
        <h1>🛡️ Access Achieved</h1>
        <p>Congrats for hacking me. *****di</p>
    </div>

</body>
</html>
