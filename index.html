<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronShield | Home</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Background image style matching your dark theme */
            background: linear-gradient(rgba(11, 15, 25, 0.85), rgba(11, 15, 25, 0.85)), 
                        url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .card {
            background-color: rgba(19, 28, 46, 0.9);
            border: 1px solid #1e293b;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            text-align: center;
        }

        h1 {
            color: #06b6d4;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        p {
            color: #9ca3af;
            font-size: 0.95rem;
            line-height: 1.5;
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 15px;
        }

        input {
            background: #0b0f19;
            border: 1px solid #1e293b;
            padding: 12px;
            border-radius: 6px;
            color: white;
            font-size: 0.95rem;
            text-align: center;
        }

        input:focus {
            outline: none;
            border-color: #06b6d4;
        }

        button {
            background: linear-gradient(135deg, #06b6d4, #3b82f6);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        #response-msg {
            margin-top: 15px;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>🛡️ WELCOME TO IRONSHIELD</h1>
            <p>Your secure sandbox portal is live and operational. Enter your details below to log your session score into the database.</p>
            
            <div class="input-group">
                <input type="text" id="username" placeholder="Your Name or Alias">
                <input type="number" id="score" placeholder="Your Score">
                <button onclick="submitScore()">Submit Score</button>
            </div>
            
            <div id="response-msg"></div>
        </div>
    </div>

    <script>
        async function submitScore() {
            const username = document.getElementById('username').value;
            const score = document.getElementById('score').value;
            const msgEl = document.getElementById('response-msg');

            if (!username || !score) {
                msgEl.style.color = '#ef4444';
                msgEl.innerText = 'Please fill out all fields.';
                return;
            }

            try {
                const response = await fetch('/api/save-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, score: Number(score) })
                });
                const data = await response.json();

                if (data.success) {
                    msgEl.style.color = '#10b981';
                    msgEl.innerText = 'Success! Score saved to database.';
                    document.getElementById('username').value = '';
                    document.getElementById('score').value = '';
                } else {
                    msgEl.style.color = '#ef4444';
                    msgEl.innerText = 'Error: ' + data.error;
                }
            } catch (err) {
                msgEl.style.color = '#ef4444';
                msgEl.innerText = 'Failed to connect to server.';
            }
        }
    </script>
</body>
</html>
