<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronShield | Admin Portal</title>
    <style>
        :root {
            --accent-cyan: #38bdf8;
            --accent-pink: #f43f5e;
            --accent-green: #4ade80;
            --text-main: #ffffff;
            --text-muted: #cbd5e1;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--text-main);
            background: linear-gradient(rgba(11, 15, 25, 0.8), rgba(11, 15, 25, 0.9)), 
                        url('Gemini_Generated_Image_i7d7n6i7d7n6i7d7.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .login-card {
            background-color: rgba(17, 24, 39, 0.9);
            backdrop-filter: blur(8px);
            border: 1px solid var(--accent-pink);
            border-radius: 10px;
            padding: 2.5rem;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 0 25px rgba(244, 63, 94, 0.3);
            text-align: center;
        }
        h2 {
            font-family: 'Courier New', Courier, monospace;
            color: var(--accent-pink);
            margin-top: 0;
            text-shadow: 0 0 8px rgba(244, 63, 94, 0.5);
        }
        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }
        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
        }
        input {
            width: 100%;
            padding: 0.75rem;
            background: rgba(11, 15, 25, 0.8);
            border: 1px solid rgba(56, 189, 248, 0.3);
            border-radius: 6px;
            color: var(--text-main);
            box-sizing: border-box;
        }
        input:focus {
            border-color: var(--accent-cyan);
            outline: none;
            box-shadow: 0 0 8px rgba(56, 189, 248, 0.4);
        }
        .btn-submit {
            width: 100%;
            background-color: var(--accent-pink);
            color: #0b0f19;
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 0 10px rgba(244, 63, 94, 0.4);
            margin-top: 0.5rem;
        }
        .btn-submit:hover {
            background-color: #fb7185;
            box-shadow: 0 0 20px var(--accent-pink);
        }
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: var(--accent-cyan);
            text-decoration: none;
            font-size: 0.85rem;
        }
        .back-link:hover {
            text-decoration: underline;
        }
        #error-msg {
            color: var(--accent-pink);
            font-size: 0.85rem;
            margin-top: 1rem;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>🔒 Admin Portal</h2>
        <form id="login-form" onsubmit="handleAdminLogin(event)">
            <div class="input-group">
                <label for="email">Admin Email</label>
                <input type="email" id="email" required placeholder="admin@ironshield.io">
            </div>
            <div class="input-group">
                <label for="password">Password</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn-submit">Authenticate</button>
            <div id="error-msg"></div>
        </form>
        <a href="index.html" class="back-link">&larr; Back to Main Terminal</a>
    </div>

    <!-- Supabase & Live Sync Script -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const supabaseUrl = 'https://xobbptbvknxdmajfpyoy.supabase.co'; 
        const supabaseKey = 'sb_publishable_IYIGDKRlLNB0YRcVFpXBMg_klP4MQVV';    
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function handleAdminLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('error-msg');
            errorDiv.textContent = "Authenticating...";

            // 1. Authenticate with Supabase
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                errorDiv.textContent = error.message;
                return;
            }

            // 2. Trigger MongoDB Sync on Render Server
            try {
                await fetch('https://ir0nshield-main.onrender.com/api/test-sync', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        user: email, 
                        action: 'ADMIN_LOGIN_SYNC',
                        timestamp: new Date().toISOString()
                    })
                });
            } catch (mongoErr) {
                console.error("MongoDB background sync note:", mongoErr);
            }

            // Success redirect or state update
            errorDiv.style.color = "var(--accent-green)";
            errorDiv.textContent = "Authentication Success! Redirecting...";
            setTimeout(() => {
                window.location.reload(); 
            }, 1000);
        }
    </script>
</body>
</html>
