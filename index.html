<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IronShield | Threat Matrix</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(rgba(5, 8, 15, 0.9), rgba(5, 8, 15, 0.9)), 
                        url('https://images.unsplash.com/photo-1526374965328-7f61d4dc18c5?q=80&w=1920&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            color: #00ffcc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
        }

        .container {
            width: 100%;
            max-width: 550px;
            padding: 20px;
        }

        .card {
            background-color: rgba(10, 15, 30, 0.85);
            border: 2px solid #00ffcc;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.25), inset 0 0 15px rgba(0, 255, 204, 0.1);
            text-align: center;
            position: relative;
        }

        .card::before {
            content: "SECURITY OVERRIDE";
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: #05080f;
            color: #ff007f;
            padding: 0 15px;
            font-size: 0.75rem;
            letter-spacing: 2px;
            border: 1px solid #ff007f;
            border-radius: 4px;
        }

        h1 {
            color: #00ffcc;
            font-size: 2rem;
            margin-bottom: 15px;
            text-shadow: 0 0 10px rgba(0, 255, 204, 0.6);
            letter-spacing: 2px;
        }

        p {
            color: #8be9fd;
            font-size: 0.9rem;
            line-height: 1.6;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .pulse-box {
            background: rgba(0, 255, 204, 0.05);
            border: 1px dashed #00ffcc;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
        }

        .status-text {
            color: #ff007f;
            font-size: 1rem;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(255, 0, 127, 0.6);
            letter-spacing: 1px;
        }

        .btn-cyber {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            padding: 15px 30px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.2);
            text-transform: uppercase;
            letter-spacing: 2px;
            width: 100%;
        }

        .btn-cyber:hover {
            background: #00ffcc;
            color: #05080f;
            box-shadow: 0 0 25px #00ffcc, 0 0 50px #00ffcc;
        }

        #response-msg {
            margin-top: 20px;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <h1>IRONSHIELD</h1>
            <p>Advanced Threat Intelligence Matrix & Cyber Defense Sandbox</p>
            
            <div class="pulse-box">
                <div class="status-text">STATUS: DEFENSE GRID ONLINE</div>
            </div>

            <button class="btn-cyber" onclick="pingCore()">Engage Telemetry Pulse</button>
            
            <div id="response-msg"></div>
        </div>
    </div>

    <script>
        async function pingCore() {
            const msgEl = document.getElementById('response-msg');
            msgEl.style.color = '#8be9fd';
            msgEl.innerText = 'TRANSMITTING NEURAL PACKET...';

            try {
                const response = await fetch('/api/save-score', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'Matrix_Operator', score: 999 })
                });
                const data = await response.json();

                if (data.success) {
                    msgEl.style.color = '#00ffcc';
                    msgEl.style.textShadow = '0 0 8px rgba(0, 255, 204, 0.8)';
                    msgEl.innerText = 'SUCCESS: NODE SECURED & LOGGED TO ATLAS!';
                } else {
                    msgEl.style.color = '#ff007f';
                    msgEl.innerText = 'ERROR: SIGNAL INTERCEPTED';
                }
            } catch (err) {
                msgEl.style.color = '#ff007f';
                msgEl.innerText = 'CRITICAL: CONNECTION FAILED';
            }
        }
    </script>
</body>
</html>
